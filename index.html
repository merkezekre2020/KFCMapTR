  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
    
    .header {
      background: linear-gradient(135deg, #E4002B 0%, #b8001f 100%);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .header .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .header .logo span { color: #fff; font-weight: 400; }
    .header .count {
      background: white;
      color: #E4002B;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 14px;
    }
    
    .search-bar {
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
    }
    .search-bar input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 25px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: #E4002B; }
    
    .content { display: flex; height: calc(100vh - 130px); }
    
    .sidebar {
      width: 350px;
      overflow-y: auto;
      background: white;
      border-right: 1px solid #e0e0e0;
    }
    .store-card {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.2s;
    }
    .store-card:hover { background: #fff5f5; }
    .store-card.active { background: #ffe0e0; border-left: 3px solid #E4002B; }
    .store-name {
      font-weight: 700;
      color: #333;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .store-address {
      color: #666;
      font-size: 13px;
      line-height: 1.4;
    }
    .store-tags {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
    }
    .tag-city { background: #f0f0f0; color: #666; }
    .tag-paket { background: #fff3e0; color: #e65100; }
    .tag-gelal { background: #e8f5e9; color: #2e7d32; }
    
    #map { flex: 1; }
    
    .info-bar {
      padding: 8px 16px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
      font-size: 13px;
      color: #666;
    }
    
    @media (max-width: 768px) {
      .content { flex-direction: column; height: auto; }
      .sidebar { width: 100%; height: 200px; }
      #map { height: 50vh; }
    }
  </style>
</head>

<div class="header">

// Map
const map = L.map('map').setView([39.0, 35.0], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 18,
}).addTo(map);

// Custom KFC marker
const kfcIcon = L.divIcon({
  html: '<div style="background:#E4002B;color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3)">KFC</div>',
  iconSize: [28, 28],
  iconAnchor: [14, 14],
  popupAnchor: [0, -14],
  className: '',
});

// Add markers
const markers = [];
stores.forEach(store => {
  const marker = L.marker([store.lat, store.lng], { icon: kfcIcon })
    .bindPopup(`
      <b style="font-size:14px">${store.name}</b><br>
      <span style="color:#666;font-size:12px">${store.address}</span><br>
      ${store.paket ? '<span style="color:#e65100;font-size:11px">📦 Paket Servis</span> ' : ''}
      ${store.gelAl ? '<span style="color:#2e7d32;font-size:11px">🚶 Gel-Al</span>' : ''}
    `);
  marker.addTo(map);
  markers.push({ marker, store });
});

    <div class="store-card" data-id="${s.id}" onclick="focusStore(${s.id})">
      <div class="store-name">${s.name}</div>
      <div class="store-address">${s.address}</div>
      <div class="store-tags">
        <span class="tag tag-city">${s.city}</span>
        ${s.paket ? '<span class="tag tag-paket">📦 Paket</span>' : ''}
        ${s.gelAl ? '<span class="tag tag-gelal">🚶 Gel-Al</span>' : ''}
      </div>
    </div>
  `).join('');
}

function focusStore(id) {
  const item = markers.find(m => m.store.id === id);
  if (item) {
    map.setView([item.store.lat, item.store.lng], 15);
    item.marker.openPopup();
    document.querySelectorAll('.store-card').forEach(c => c.classList.remove('active'));
    document.querySelector(`[data-id="${id}"]`)?.classList.add('active');
  }
}

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  const filtered = stores.filter(s =>
    s.name.toLowerCase().includes(q) ||
    s.address.toLowerCase().includes(q) ||
    s.city.toLowerCase().includes(q) ||
    s.district.toLowerCase().includes(q)
  );
  renderSidebar(filtered);
});

// Initial render
renderSidebar(stores);
</script>
</body>
</html>
